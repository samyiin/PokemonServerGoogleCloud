worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format ssl_debug '$remote_addr - $remote_user [$time_local] '
                         '"$request" $status $body_bytes_sent '
                         'Host:$host Upstream:$upstream_addr '
                         'SSL:$ssl_protocol Cipher:$ssl_cipher';

    underscores_in_headers on;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # NDS / 3DS legacy TLS (NDS constraint cert chain).
    ssl_certificate     /etc/nginx/certs/server-chain.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols SSLv3 TLSv1;
    ssl_ciphers 'RC4-SHA:RC4-MD5';
    ssl_prefer_server_ciphers on;

    upstream dwc_nas {
        server dwc:9000;
    }

    upstream dwc_dls1 {
        server dwc:9003;
    }

    upstream dwc_gamestats {
        server dwc:9002;
    }

    upstream dwc_storage {
        server dwc:8000;
    }

    server {
        listen 443 ssl;
        server_name nas.nintendowifi.net naswii.nintendowifi.net conntest.nintendowifi.net;

        access_log /var/log/nginx/access.log ssl_debug;
        error_log /var/log/nginx/error.log info;

        location / {
            proxy_pass http://dwc_nas;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }
    }

    server {
        listen 443 ssl;
        server_name dls1.nintendowifi.net;

        access_log /var/log/nginx/access.log ssl_debug;
        error_log /var/log/nginx/error.log info;

        location / {
            proxy_pass http://dwc_dls1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }
    }

    server {
        listen 443 ssl;
        server_name gamestats.gs.nintendowifi.net gamestats2.gs.nintendowifi.net;

        access_log /var/log/nginx/access.log ssl_debug;
        error_log /var/log/nginx/error.log info;

        location / {
            proxy_pass http://dwc_gamestats;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }
    }

    server {
        listen 443 ssl;
        server_name sake.gs.nintendowifi.net *.sake.gs.nintendowifi.net
                    secure.sake.gs.nintendowifi.net *.secure.sake.gs.nintendowifi.net;

        access_log /var/log/nginx/access.log ssl_debug;
        error_log /var/log/nginx/error.log info;

        location / {
            proxy_pass http://dwc_storage;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }
    }

    # Plain HTTP fallback (local testing or clients that skip TLS).
    server {
        listen 80;
        server_name nas.nintendowifi.net naswii.nintendowifi.net conntest.nintendowifi.net;

        access_log /var/log/nginx/access.log ssl_debug;
        error_log /var/log/nginx/error.log info;

        location / {
            proxy_pass http://dwc_nas;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }
    }

    server {
        listen 80;
        server_name dls1.nintendowifi.net;

        access_log /var/log/nginx/access.log ssl_debug;
        error_log /var/log/nginx/error.log info;

        location / {
            proxy_pass http://dwc_dls1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }
    }

    server {
        listen 80;
        server_name gamestats.gs.nintendowifi.net gamestats2.gs.nintendowifi.net;

        access_log /var/log/nginx/access.log ssl_debug;
        error_log /var/log/nginx/error.log info;

        location / {
            proxy_pass http://dwc_gamestats;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }
    }

    server {
        listen 80;
        server_name sake.gs.nintendowifi.net *.sake.gs.nintendowifi.net
                    secure.sake.gs.nintendowifi.net *.secure.sake.gs.nintendowifi.net;

        access_log /var/log/nginx/access.log ssl_debug;
        error_log /var/log/nginx/error.log info;

        location / {
            proxy_pass http://dwc_storage;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }
    }
}
