services:
  dwc:
    build:
      context: ../..
      dockerfile: containers/dwc_container/Dockerfile
    platform: linux/amd64
    container_name: dwc
    restart: unless-stopped
    volumes:
      - dwc_data:/var/lib/dwc
    networks:
      - pokemon_net
    ports:
      # GameSpy: NDS clients connect directly to these ports.
      - "27900:27900/udp"
      - "27901:27901/udp"
      - "28910:28910/udp"
      - "29900:29900/tcp"
      - "29901:29901/tcp"
      - "29920:29920/tcp"
      # Optional: publish HTTP upstreams for local debugging without nginx.
      # - "8000:8000"
      # - "9000:9000"
      # - "9002:9002"
      # - "9003:9003"

networks:
  pokemon_net:
    name: pokemon_net

volumes:
  dwc_data:
